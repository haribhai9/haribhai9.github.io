<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Hari Bhai Company</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:transparent;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:300px;
background:#ffffff;
border-radius:14px;
padding:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.4);
text-align:center;
animation:popup 0.3s ease;
}

.company{
font-size:16px;
font-weight:bold;
color:white;
background:#0a66c2;
padding:6px;
border-radius:6px;
margin-bottom:5px;
}

.tagline{
font-size:11px;
color:gray;
margin-bottom:15px;
}

h2{
margin:10px 0;
color:#0a66c2;
font-size:16px;
}

input{
width:100%;
padding:8px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:13px;
}

button{
width:100%;
padding:8px;
margin-top:8px;
background:#0a66c2;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
font-size:13px;
}

button:hover{
background:#003366;
}

.switch{
margin-top:10px;
font-size:11px;
}

.switch span{
color:#0a66c2;
cursor:pointer;
font-weight:bold;
}

@keyframes popup{
from{transform:scale(0.7);opacity:0;}
to{transform:scale(1);opacity:1;}
}
</style>
</head>

<body>

<div class="container" id="authBox">

<div class="company">Hari Bhai Company</div>
<div class="tagline">Trusted & Professional Digital Services</div>

<h2>Login</h2>

<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="pass" placeholder="Enter Password">

<button onclick="login()">Login</button>

<div class="switch">
Don't have account?
<span onclick="showRegister()">Register</span>
</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
getAuth, 
createUserWithEmailAndPassword, 
signInWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
getFirestore, 
doc, 
setDoc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBG0LYrIEuV_eYK8rZvweoQASTBF_gfDfA",
authDomain: "ff-tournament-915ed.firebaseapp.com",
projectId: "ff-tournament-915ed",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function generateUsername(){
return "HB" + Math.floor(100000 + Math.random() * 900000);
}

window.login = async function(){

let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;

try{
await signInWithEmailAndPassword(auth,email,pass);
alert("Login Successful ✅");
window.location.href="index.html";
}catch(error){
alert("Invalid Email or Password ❌");
}

}

window.showRegister = function(){

document.getElementById("authBox").innerHTML=`
<div class="company">Hari Bhai Company</div>
<div class="tagline">Trusted & Professional Digital Services</div>

<h2>Register</h2>

<input type="email" id="remail" placeholder="Enter Email">
<input type="password" id="rpass" placeholder="Create Password">

<button onclick="register()">Create Account</button>

<div class="switch">
Already have account?
<span onclick="location.reload()">Login</span>
</div>
`;

}

window.register = async function(){

let email=document.getElementById("remail").value;
let pass=document.getElementById("rpass").value;

try{

const userCred = await createUserWithEmailAndPassword(auth,email,pass);
const user = userCred.user;

let randomUsername = generateUsername();

await setDoc(doc(db,"users",user.uid),{
username: randomUsername,
email: email,
balance: 0,
blocked: false
});

alert("Account Created ✅ Username: " + randomUsername);
window.location.href="index.html";

}catch(error){
alert(error.message);
}

}

</script>

</body>
</html>
