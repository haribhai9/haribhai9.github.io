<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account</title>

<style>
body{
margin:0;
font-family:'Segoe UI',Arial;
background:#0f172a;
color:white;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#1e293b;
font-weight:bold;
}

.menu-btn{
font-size:20px;
cursor:pointer;
}

.sidebar{
position:fixed;
right:-220px;
top:0;
width:220px;
height:100%;
background:#1e293b;
transition:0.3s;
padding-top:50px;
box-shadow:-2px 0 10px rgba(0,0,0,0.5);
}

.close-btn{
position:absolute;
top:10px;
right:15px;
font-size:18px;
cursor:pointer;
}

.sidebar .info{
padding:12px;
font-size:13px;
border-bottom:1px solid #334155;
}

.sidebar button{
display:block;
margin:15px;
padding:6px 10px;
border:none;
border-radius:5px;
font-size:12px;
cursor:pointer;
background:#ef4444;
color:white;
}

.profile{
text-align:center;
margin-top:30px;
}

.profile img{
width:110px;
height:110px;
border-radius:50%;
border:3px solid #3b82f6;
object-fit:cover;
}

.profile h3{
margin:10px 0 5px;
font-size:18px;
}

.balance{
background:#22c55e;
display:inline-block;
padding:5px 12px;
border-radius:20px;
font-size:13px;
}

.card{
background:#1e293b;
margin:25px 20px;
padding:15px;
border-radius:10px;
}

.card button{
width:100%;
padding:8px;
margin-top:8px;
background:#3b82f6;
border:none;
border-radius:6px;
color:white;
font-size:13px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<div>My Account</div>
<div class="menu-btn" onclick="openMenu()">⋮</div>
</div>

<div class="sidebar" id="sidebar">
<div class="close-btn" onclick="closeMenu()">✖</div>
<div class="info"><b>Username:</b> <span id="sideUsername">Loading...</span></div>
<button onclick="logout()">Logout</button>
</div>

<div class="profile">
<img src="random.png">
<h3 id="username">Loading...</h3>
<div class="balance">Balance: ₹<span id="balance">0</span></div>
</div>

<div class="card">
<h3 style="margin-top:0;">Deposit Coins</h3>

<button onclick="location.href='deposit.html'">
Go To Deposit
</button>

<button onclick="location.href='withdrawal.html'" 
style="background:#22c55e; margin-top:10px;">
Go To Withdrawal
</button>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
getFirestore, 
doc, 
onSnapshot 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBG0LYrIEuV_eYK8rZvweoQASTBF_gfDfA",
authDomain: "ff-tournament-915ed.firebaseapp.com",
projectId: "ff-tournament-915ed",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, (user) => {

if(user){

const docRef = doc(db,"users",user.uid);

// REAL TIME LISTENER 🔥
onSnapshot(docRef, (docSnap)=>{

if(docSnap.exists()){

const data = docSnap.data();

document.getElementById("username").innerText = data.username;
document.getElementById("sideUsername").innerText = data.username;
document.getElementById("balance").innerText = data.balance;

}

});

}else{
window.location.href="auth.html";
}

});

window.logout = function(){
signOut(auth).then(()=>{
window.location.href="auth.html";
});
}

</script>

<script>
function openMenu(){
document.getElementById("sidebar").style.right="0px";
}
function closeMenu(){
document.getElementById("sidebar").style.right="-220px";
}
</script>

</body>
</html>
