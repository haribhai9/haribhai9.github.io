<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{
margin:0;
font-family:'Segoe UI',Arial;
background:#0f172a;
color:white;
padding:20px;
}
h1{text-align:center;margin-bottom:20px;}
.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 0 15px rgba(0,0,0,0.5);
}
input{
width:100%;
padding:8px;
margin-top:8px;
border:none;
border-radius:6px;
}
button{
margin-top:8px;
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}
.green{background:#22c55e;color:white;}
.red{background:#ef4444;color:white;}
.blue{background:#3b82f6;color:white;}
.user-box{
background:#111827;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}
hr{border:1px solid #334155;}
</style>
</head>

<body>
<script>

const adminPassword = "998877";

let pass = prompt("Enter Admin Password");

if(pass === null || pass !== adminPassword){
document.body.innerHTML="<h1 style='text-align:center;margin-top:100px;'>Access Denied ❌</h1>";
throw new Error("Access Blocked");
}

</script>

<h1>🔥 Admin Dashboard</h1>

<!-- ROOM CONTROL -->
<div class="card">
<h3>📦 Room Control</h3>

<label>Room 1 ID</label>
<input type="text" id="roomID_room1">
<label>Room 1 Pass</label>
<input type="text" id="roomPASS_room1">
<button class="green" onclick="saveRoom('room1')">Save Room 1</button>
<button class="red" onclick="resetRoom('room1')">Reset Room 1</button>
<hr>

<label>Room 2 ID</label>
<input type="text" id="roomID_room2">
<label>Room 2 Pass</label>
<input type="text" id="roomPASS_room2">
<button class="green" onclick="saveRoom('room2')">Save Room 2</button>
<button class="red" onclick="resetRoom('room2')">Reset Room 2</button>
<hr>

<label>Room 3 ID</label>
<input type="text" id="roomID_room3">
<label>Room 3 Pass</label>
<input type="text" id="roomPASS_room3">
<button class="green" onclick="saveRoom('room3')">Save Room 3</button>
<button class="red" onclick="resetRoom('room3')">Reset Room 3</button>

<hr>

<label>Room 4 ID</label>
<input type="text" id="roomID_room4">
<label>Room 4 Pass</label>
<input type="text" id="roomPASS_room4">
<button class="green" onclick="saveRoom('room4')">Save Room 4</button>
<button class="red" onclick="resetRoom('room4')">Reset Room 4</button>
</div>

<!-- MATCH TIME -->
<div class="card">
<h3>⏰ Match Timing</h3>

<label>Match 1 Time</label>
<input type="text" id="matchTime1">

<button class="green" onclick="updateMatchTime('match1')">Update</button>

<hr>

<label>Match 2 Time</label>
<input type="text" id="matchTime2">

<button class="green" onclick="updateMatchTime('match2')">Update</button>
<hr>

<label>Match 3 Time</label>
<input type="text" id="matchTime3">
<button class="green" onclick="updateMatchTime('match3')">Update</button>

<hr>

<label>Match 4 Time</label>
<input type="text" id="matchTime4">
<button class="green" onclick="updateMatchTime('match4')">Update</button>
</div>

<!-- USERS -->
<div class="card">
<h3>👥 All Users</h3>
<div id="users"></div>
</div>

<!-- DEPOSITS -->
<div class="card">
<h3>💰 Deposit Requests</h3>
<div id="deposits"></div>
</div>

<!-- WITHDRAWALS -->
<div class="card">
<h3>💸 Withdrawal Requests</h3>
<div id="withdrawals"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore,
collection,
doc,
onSnapshot,
updateDoc,
setDoc,
deleteDoc,
getDoc,
getDocs,
increment,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBG0LYrIEuV_eYK8rZvweoQASTBF_gfDfA",
authDomain: "ff-tournament-915ed.firebaseapp.com",
projectId: "ff-tournament-915ed",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

console.log("🔥 Admin Connected");


// ================= ROOM SAVE =================
window.saveRoom = async function(id){

let roomID=document.getElementById("roomID_"+id).value;
let roomPASS=document.getElementById("roomPASS_"+id).value;

await setDoc(doc(db,"rooms",id),{
roomID: roomID,
roomPASS: roomPASS
},{merge:true});

alert(id+" Saved ✅");
}


// ================= MATCH TIME =================
window.updateMatchTime = async function(match){

let number = match.replace("match",""); 
let time = document.getElementById("matchTime"+number).value;

await setDoc(doc(db,"settings",match),{
time:time
});

alert(match+" Time Updated ✅");
}


// realtime load
onSnapshot(doc(db,"settings","match1"),(snap)=>{
if(snap.exists()){
document.getElementById("matchTime1").value=snap.data().time;
}
});

onSnapshot(doc(db,"settings","match2"),(snap)=>{
if(snap.exists()){
document.getElementById("matchTime2").value=snap.data().time;
}
});

onSnapshot(doc(db,"settings","match3"),(snap)=>{
if(snap.exists()){
document.getElementById("matchTime3").value=snap.data().time;
}
});

onSnapshot(doc(db,"settings","match4"),(snap)=>{
if(snap.exists()){
document.getElementById("matchTime4").value=snap.data().time;
}
});

// ================= USERS =================
const usersDiv=document.getElementById("users");

onSnapshot(collection(db,"users"),(snapshot)=>{

usersDiv.innerHTML="";

snapshot.forEach((docSnap)=>{

const data=docSnap.data();
const uid=docSnap.id;

usersDiv.innerHTML+=`
<div class="user-box">
<b>${data.username}</b><br>
Deposit: ₹${data.balance || 0}<br>
Winning: ₹${data.winningBalance || 0}<br>
Joined Room: ${data.joinedRoom ? data.joinedRoom : "Not Joined"}<br>
Game Name: ${data.gameName ? data.gameName : "Not Entered"}<br>
Status: ${data.blocked ? "🚫 Blocked" : "✅ Active"}<br>

<input type="number" placeholder="Enter Amount" id="amt_${uid}">

<button class="green" onclick="addBalance('${uid}')">Add</button>
<button class="red" onclick="cutBalance('${uid}')">Cut</button>
<button class="blue" onclick="toggleBlock('${uid}',${data.blocked})">
${data.blocked ? "Unblock" : "Block"}
</button>
</div>
<hr>
`;
});
});

window.addBalance = async function(uid){

let amt = parseInt(document.getElementById("amt_"+uid).value);
if(!amt) return alert("Enter Amount");

// user data first fetch
const userRef = doc(db,"users",uid);
const userSnap = await getDoc(userRef);

let currentWinning = userSnap.data().winningBalance || 0;

await updateDoc(userRef,{
winningBalance: currentWinning + amt
});

alert("Winning Balance Added ✅");

}

window.cutBalance = async function(uid){
let amt=parseInt(document.getElementById("amt_"+uid).value);
if(!amt)return alert("Enter Amount");

await updateDoc(doc(db,"users",uid),{
balance: increment(-amt)
});
}

window.toggleBlock = async function(uid,status){
await updateDoc(doc(db,"users",uid),{
blocked: !status
});
}


// ================= DEPOSITS =================
const depositDiv=document.getElementById("deposits");

const depositQuery = query(
collection(db,"deposits"),
where("status","==","pending")
);

onSnapshot(depositQuery,(snapshot)=>{

depositDiv.innerHTML="";

snapshot.forEach((docSnap)=>{

const d=docSnap.data();
const id=docSnap.id;

depositDiv.innerHTML+=`
<div class="user-box">
Username: ${d.username || d.uid}<br>
Amount: ₹${d.amount}<br>
UTR: ${d.utr}<br>
Status: ${d.status}<br>

<button class="green" onclick="approveDeposit('${id}','${d.uid}',${d.amount})">Approve</button>
<button class="red" onclick="rejectDeposit('${id}')">Reject</button>
</div>
<hr>
`;
});

});

window.approveDeposit = async function(depId,uid,amount){

const depRef = doc(db,"deposits",depId);
const depSnap = await getDoc(depRef);

if(depSnap.data().status !== "pending"){
alert("Already Processed ❌");
return;
}

await updateDoc(doc(db,"users",uid),{
balance: increment(amount)
});

await updateDoc(depRef,{
status:"approved"
});

alert("Deposit Approved ✅");
}

window.rejectDeposit = async function(depId){

await updateDoc(doc(db,"deposits",depId),{
status:"rejected"
});

alert("Deposit Rejected ❌");
}


// ================= WITHDRAWALS (LOCKED SYSTEM) =================
const withdrawDiv=document.getElementById("withdrawals");

const withdrawQuery = query(
collection(db,"withdrawals"),
where("status","==","pending")
);

onSnapshot(withdrawQuery,(snapshot)=>{
if(snapshot.empty){
withdrawDiv.innerHTML="No Pending Withdrawals";
return;
}
withdrawDiv.innerHTML="";

snapshot.forEach((docSnap)=>{

const w=docSnap.data();
const id=docSnap.id;

if(w.status==="pending"){

withdrawDiv.innerHTML+=`
<div class="user-box">
Username: ${w.username || w.uid}<br>
Amount: ₹${w.amount}<br>
Method: ${w.method}<br>
Details: ${w.details}<br>

<button class="green" onclick="approveWithdraw('${id}')">Approve</button>
<button class="red" onclick="rejectWithdraw('${id}','${w.uid}',${w.amount})">Reject</button>
</div>
<hr>
`;
}
});
});

window.approveWithdraw = async function(wid){

const wRef = doc(db,"withdrawals",wid);
const wSnap = await getDoc(wRef);

if(wSnap.data().status !== "pending"){
alert("Already Processed ❌");
return;
}

await updateDoc(wRef,{
status:"approved"
});

alert("Withdrawal Approved ✅");
}

window.rejectWithdraw = async function(wid,uid,amount){

const wRef = doc(db,"withdrawals",wid);
const wSnap = await getDoc(wRef);

if(wSnap.data().status !== "pending"){
alert("Already Processed ❌");
return;
}

await updateDoc(doc(db,"users",uid),{
winningBalance: increment(amount)
});

await updateDoc(wRef,{
status:"rejected"
});

alert("Rejected & Balance Returned ❌");
}

window.resetRoom = async function(roomId){

if(!confirm("Are you sure? This will reset everything!")) return;

// 1️⃣ Reset Room Data
await setDoc(doc(db,"rooms",roomId),{
roomID:"",
roomPASS:"",
slots:0
});

// 2️⃣ Reset All Users Joined In This Room
const usersSnap = await getDocs(collection(db,"users"));

for(const userDoc of usersSnap.docs){

const data = userDoc.data();

if(data.joinedRoom === roomId){

await updateDoc(doc(db,"users",userDoc.id),{
joinedRoom: "",
gameName: ""
});

}

}

alert("Room Reset Successfully ✅");

}
</script>
</body>
</html>
