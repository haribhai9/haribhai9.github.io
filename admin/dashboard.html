<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}
.header{
background:#243b55;
color:white;
padding:15px;
text-align:center;
}
.card{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}
input{
width:100%;
padding:10px;
margin:10px 0;
}
button{
padding:10px;
background:#243b55;
color:white;
border:none;
cursor:pointer;
}
.logout{
background:red;
margin-top:10px;
}
</style>
</head>
<body>

<div class="header">
<h2>Admin Dashboard</h2>
</div>

<div class="card">
<h3>Create Room 🎮</h3>
<input type="text" id="roomid" placeholder="Enter Room ID">
<input type="text" id="roompass" placeholder="Enter Room Password">
<button onclick="saveRoom()">Save Room</button>
<button class="logout" onclick="logout()">Logout</button>
<p id="msg"></p>
</div>

<script>
function saveRoom(){
var id = document.getElementById("roomid").value;
var pass = document.getElementById("roompass").value;

localStorage.setItem("roomID", id);
localStorage.setItem("roomPASS", pass);

document.getElementById("msg").innerText = "Room Saved Successfully ✅";
}

function logout(){
window.location.href = "index.html";
}
</script>

</body>
</html>
