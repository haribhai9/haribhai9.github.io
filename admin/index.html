<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(45deg,#141e30,#243b55);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}
.box{
background:white;
color:black;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}
input{
width:100%;
padding:10px;
margin:10px 0;
}
button{
width:100%;
padding:10px;
background:#243b55;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
<h2>Admin Login</h2>
<input type="password" id="password" placeholder="Enter Password">
<button onclick="login()">Login</button>
<p id="error" style="color:red;"></p>
</div>

<script>
function login(){
var pass = document.getElementById("password").value;
if(pass === "12345"){
window.location.href = "dashboard.html";
}else{
document.getElementById("error").innerText = "Wrong Password!";
}
}
</script>

</body>
</html>
