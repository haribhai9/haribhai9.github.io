<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Tournament</title>

<style>
body{
margin:0;
font-family:'Segoe UI',Arial;
background:#0f172a;
color:white;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#1e293b;
}

.balance{
background:#22c55e;
padding:6px 14px;
border-radius:20px;
font-weight:bold;
}

.tournament{
background:#1e293b;
margin:20px;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 15px rgba(0,0,0,0.6);
}

.tournament img{
width:100%;
height:180px;
object-fit:cover;
}

.t-info{
padding:15px;
}

.slot{
font-weight:bold;
margin-top:5px;
}

.time{
color:#facc15;
font-weight:bold;
margin-top:5px;
}

.btn{
width:100%;
padding:12px;
margin-top:12px;
background:linear-gradient(45deg,#3b82f6,#06b6d4);
border:none;
color:white;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

.btn:disabled{
background:gray;
cursor:not-allowed;
}

.room-box{
margin-top:10px;
background:#0ea5e9;
padding:10px;
border-radius:6px;
display:none;
}
</style>
</head>

<body>

<div class="header">
<div class="balance">Balance: ₹<span id="balance">0</span></div>
</div>

<!-- ROOM 1 -->
<div class="tournament">
<img src="two.png">
<div class="t-info">
<h3>Free Fire Tournament</h3>
<p>Entry: ₹20</p>
<p>Win: ₹35</p>
<p class="time">Match Time: <span id="time_room1">Loading...</span></p>
<p class="slot" id="slot_room1">Loading...</p>
<button class="btn" id="btn_room1" onclick="joinMatch('room1',20)">Join Now</button>
<div class="room-box" id="room1"></div>
</div>
</div>

<!-- ROOM 2 -->
<div class="tournament">
<img src="one.png">
<div class="t-info">
<h3>Free Fire Tournament</h3>
<p>Entry: ₹10</p>
<p>Win: ₹20</p>
<p class="time">Match Time: <span id="time_room2">Loading...</span></p>
<p class="slot" id="slot_room2">Loading...</p>
<button class="btn" id="btn_room2" onclick="joinMatch('room2',10)">Join Now</button>
<div class="room-box" id="room2"></div>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
getFirestore,
doc,
onSnapshot,
updateDoc,
getDoc,
increment
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBG0LYrIEuV_eYK8rZvweoQASTBF_gfDfA",
authDomain: "ff-tournament-915ed.firebaseapp.com",
projectId: "ff-tournament-915ed",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;
const maxSlot = 2;

/* ================= AUTH ================= */

onAuthStateChanged(auth,(user)=>{

if(!user){
window.location.href="auth.html";
return;
}

currentUser = user;

const userRef = doc(db,"users",user.uid);

onSnapshot(userRef,(snap)=>{
if(!snap.exists()) return;

let data = snap.data();
document.getElementById("balance").innerText = data.balance || 0;

// Auto show joined room after refresh
if(data.joinedRoom){
showRoom(data.joinedRoom);
document.getElementById("btn_"+data.joinedRoom).disabled = true;
}

});

});

/* ================= MATCH TIME ================= */

onSnapshot(doc(db,"settings","match"),(snap)=>{
if(snap.exists()){
document.getElementById("time_room1").innerText = snap.data().time;
document.getElementById("time_room2").innerText = snap.data().time;
}
});

/* ================= SLOT LIVE ================= */

["room1","room2"].forEach((room)=>{

onSnapshot(doc(db,"rooms",room),(snap)=>{

let slotText = document.getElementById("slot_"+room);
let btn = document.getElementById("btn_"+room);

if(!snap.exists()){
slotText.innerHTML = "Waiting for Admin...";
return;
}

let slot = snap.data().slots || 0;

if(slot >= maxSlot){
slotText.innerHTML = "Slot: FULL ❌";
slotText.style.color = "red";
btn.disabled = true;
}else{
slotText.innerHTML = "Slot: "+slot+" / "+maxSlot;
slotText.style.color = "#22c55e";
}

});

});

/* ================= JOIN MATCH ================= */

window.joinMatch = async function(room,fee){

const userRef = doc(db,"users",currentUser.uid);
const roomRef = doc(db,"rooms",room);

const userSnap = await getDoc(userRef);
const roomSnap = await getDoc(roomRef);

if(!userSnap.exists() || !roomSnap.exists()) return;

let userData = userSnap.data();
let balance = userData.balance;
let slot = roomSnap.data().slots || 0;

// Already joined check
if(userData.joinedRoom){
alert("You already joined a match ❌");
showRoom(userData.joinedRoom);
return;
}

if(balance < fee){
alert("Insufficient Balance ❌");
return;
}

if(slot >= maxSlot){
alert("Slot Full ❌");
return;
}

// Deduct balance + mark joined
await updateDoc(userRef,{
balance: balance - fee,
joinedRoom: room
});

// Increase slot
await updateDoc(roomRef,{
slots: increment(1)
});

showRoom(room);
alert("Match Joined Successfully ✅");

};

/* ================= SHOW ROOM ================= */

function showRoom(room){

const box = document.getElementById(room);
box.style.display = "block";

onSnapshot(doc(db,"rooms",room),(snap)=>{

if(snap.exists()){
box.innerHTML =
"<b>Room ID:</b> "+(snap.data().roomID || "Waiting...")+
"<br><b>Password:</b> "+(snap.data().roomPASS || "Waiting...");
}

});

}

</script>

</body>
</html>
