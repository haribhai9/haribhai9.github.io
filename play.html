<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Tournament</title>

<style>
body{
margin:0;
font-family:'Segoe UI',Arial;
background:#0f172a;
color:white;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#1e293b;
}

.balance{
background:#22c55e;
padding:6px 12px;
border-radius:20px;
font-weight:bold;
}

.menu-btn{
font-size:22px;
cursor:pointer;
}

.sidebar{
position:fixed;
right:-250px;
top:0;
width:250px;
height:100%;
background:#1e293b;
transition:0.3s;
padding-top:60px;
}

.sidebar a{
display:block;
color:white;
padding:15px;
text-decoration:none;
border-bottom:1px solid #334155;
}

.sidebar a:hover{
background:#334155;
}

.tournament{
background:#1e293b;
margin:20px;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.tournament img{
width:100%;
height:180px;
object-fit:cover;
}

.t-info{
padding:15px;
}

.btn{
display:block;
width:100%;
padding:10px;
margin-top:10px;
background:#3b82f6;
border:none;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

.room-box{
margin-top:10px;
background:#0ea5e9;
padding:8px;
border-radius:6px;
display:none;
}
</style>
</head>

<body>

<div class="header">
<div class="balance">Balance: ₹100</div>
<div class="menu-btn" onclick="openMenu()">⋮</div>
</div>

<div class="sidebar" id="sidebar">
<a href="deposit.html">Deposit</a>
<a href="index.html">Go To Home</a>
</div>

<!-- Tournament 1 -->
<div class="tournament">
<img src="random.png">
<div class="t-info">
<h3>Free Fire Tournament</h3>
<p>Entry: ₹20</p>
<p>Win: ₹35</p>
<button class="btn" onclick="joinRoom('room1')">Join Now</button>
<div class="room-box" id="room1">
Room ID: Waiting for Admin...
</div>
</div>
</div>

<!-- Tournament 2 -->
<div class="tournament">
<img src="random.png">
<div class="t-info">
<h3>Free Fire Tournament</h3>
<p>Entry: ₹10</p>
<p>Win: ₹20</p>
<button class="btn" onclick="joinRoom('room2')">Join Now</button>
<div class="room-box" id="room2">
Room ID: Waiting for Admin...
</div>
</div>
</div>

<script>
function openMenu(){
let side = document.getElementById("sidebar");
if(side.style.right=="0px"){
side.style.right="-250px";
}else{
side.style.right="0px";
}
}

function joinRoom(id){
document.getElementById(id).style.display="block";
}
</script>

</body>
</html>
