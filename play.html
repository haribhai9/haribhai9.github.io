<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Tournament</title>

<style>
body{
margin:0;
font-family:'Segoe UI',Arial;
background:#0f172a;
color:white;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#1e293b;
}

.balance{
background:#22c55e;
padding:6px 12px;
border-radius:20px;
font-weight:bold;
}

.menu-btn{
font-size:22px;
cursor:pointer;
}

.sidebar{
position:fixed;
right:-250px;
top:0;
width:250px;
height:100%;
background:#1e293b;
transition:0.3s;
padding-top:60px;
z-index:1000;
}

.close-btn{
position:absolute;
top:15px;
left:15px;
font-size:20px;
cursor:pointer;
}

.sidebar a{
display:block;
color:white;
padding:15px;
text-decoration:none;
border-bottom:1px solid #334155;
}

.sidebar a:hover{
background:#334155;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:999;
}

.tournament{
background:#1e293b;
margin:20px;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.tournament img{
width:100%;
height:180px;
object-fit:cover;
}

.t-info{
padding:15px;
}

.btn{
display:block;
width:100%;
padding:10px;
margin-top:10px;
background:#3b82f6;
border:none;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

.room-box{
margin-top:10px;
background:#0ea5e9;
padding:8px;
border-radius:6px;
display:none;
}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="header">
<div class="balance">Balance: ₹100</div>
<div class="menu-btn" onclick="openMenu()">⋮</div>
</div>

<div class="sidebar" id="sidebar">
<div class="close-btn" onclick="closeMenu()">✖</div>
<a href="deposit.html">Deposit</a>
<a href="index.html">Go To Home</a>
</div>

<!-- Tournament 1 -->
<div class="tournament">
<img src="random.png">
<div class="t-info">
<h3>Free Fire Tournament</h3>
<p>Entry: ₹20</p>
<p>Win: ₹35</p>
<button class="btn" onclick="joinRoom('room1',20)">Join Now</button>
<div class="room-box" id="room1"></div>
</div>
</div>

<!-- Tournament 2 -->
<div class="tournament">
<img src="random.png">
<div class="t-info">
<h3>Free Fire Tournament</h3>
<p>Entry: ₹10</p>
<p>Win: ₹20</p>
<button class="btn" onclick="joinRoom('room2',10)">Join Now</button>
<div class="room-box" id="room2"></div>
</div>
</div>

<script>

let balance = 100;

if(localStorage.getItem("userBalance")){
balance = parseInt(localStorage.getItem("userBalance"));
}else{
localStorage.setItem("userBalance", balance);
}

updateBalance();

function updateBalance(){
document.querySelector(".balance").innerText = "Balance: ₹" + balance;
}

function openMenu(){
document.getElementById("sidebar").style.right="0px";
document.getElementById("overlay").style.display="block";
}

function closeMenu(){
document.getElementById("sidebar").style.right="-250px";
document.getElementById("overlay").style.display="none";
}

function joinRoom(id, fee){

if(balance < fee){
alert("Insufficient Balance ❌");
return;
}

balance -= fee;
localStorage.setItem("userBalance", balance);
updateBalance();

let roomID = localStorage.getItem("roomID");
let roomPASS = localStorage.getItem("roomPASS");

let box = document.getElementById(id);
box.style.display = "block";

if(roomID){
box.innerHTML = `
<b>Room ID:</b> ${roomID} <br>
<b>Password:</b> ${roomPASS}
`;
}else{
box.innerHTML = "Room ID: Waiting for Admin...";
}

alert("Joined Successfully ✅");
}

</script>

</body>
</html>
